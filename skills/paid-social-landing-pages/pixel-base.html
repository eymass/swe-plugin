<!--

  Usage:
  1. Replace YOUR_PIXEL_ID with the pixel from Events Manager.
  2. Call ttq.grantConsent() ONLY after your CMP records opt-in.
  3. For US state privacy laws (CA, VA, CO, CT, UT), pass limited_data_use: true
     on every event (TikTok's Meta-LDU equivalent — TikTok has no Google
     Consent Mode v2 analog).

     Events API call — generate once at action time, send both sides.

<!--
  Example: fire a Purchase event with a shared event_id and EMQ identifiers.
  Call this on the thank-you page after a confirmed conversion.

  The same event_id MUST be sent server-side to the Events API for dedup.
-->

<script>
// Generate once at conversion time; persist on the server; echo back to client.
const eventId = 'evt_' + crypto.randomUUID();

ttq.track('Purchase', {
  contents: [{
    content_id: 'SKU_123',
    content_name: 'Blue Widget',
    quantity: 1,
    price: 99.99
  }],
  content_type: 'product',
  currency: 'USD',
  value: 99.99,
  order_id: 'ORDER-10045'
}, {
  event_id: eventId
});
</script>

<!--
  Consent flow example (using a generic CMP). Fire grantConsent when user accepts.
-->

<script>
window.addEventListener('cmp:consent-granted', function (e) {
  if (e.detail.categories.includes('marketing')) {
    ttq.grantConsent();
  }
});

window.addEventListener('cmp:consent-revoked', function () {
  ttq.revokeConsent();
});
</script>
